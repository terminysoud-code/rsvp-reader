<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RSVP Speed Reader</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" type="module"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="dashboard-bar">
        <div>
          <h1>RSVP Speed Reader</h1>
          <p id="readerCount">1 reader</p>
        </div>
        <button id="addReaderButton" class="primary-button" type="button">+ Add reader</button>
      </header>

      <section id="readerGrid" class="reader-grid" aria-label="Reader dashboard"></section>
    </main>

    <template id="readerTemplate">
      <article class="reader-instance">
        <header class="reader-header">
          <h2 data-role="reader-title">Reader</h2>
          <button data-role="remove-reader" class="icon-button" type="button" aria-label="Remove reader">
            Remove
          </button>
        </header>

        <section class="reader-panel" aria-label="Speed reading display">
          <div data-role="word-display" class="word-display" aria-live="polite">Paste or upload text</div>
          <div class="progress-section">
            <button data-role="progress-track" class="progress-track" type="button" aria-label="Seek through text">
              <span data-role="progress-fill" class="progress-fill"></span>
            </button>
            <div class="progress-meta">
              <span data-role="progress-text">Word 0 of 0</span>
              <span data-role="percent-text">0%</span>
            </div>
          </div>
        </section>

        <section class="controls-panel" aria-label="Reader controls">
          <div class="control-row">
            <button data-role="start-button" class="primary-button" type="button">Start</button>
            <button data-role="pause-button" type="button">Pause</button>
            <button data-role="reset-button" type="button">Reset</button>
          </div>

          <div class="speed-controls" aria-label="Speed controls">
            <button data-role="decrease-speed" type="button" aria-label="Decrease speed">-</button>
            <output data-role="wpm-output">400 WPM</output>
            <button data-role="increase-speed" type="button" aria-label="Increase speed">+</button>
          </div>

          <div class="text-field">
            <div class="text-field-header">
              <span>Text</span>
              <div class="simplify-tools">
                <label>
                  <span>Length</span>
                  <select data-role="simplify-length" aria-label="Simplification length">
                    <option value="10">10%</option>
                    <option value="20">20%</option>
                    <option value="30" selected>30%</option>
                    <option value="50">50%</option>
                    <option value="custom">Custom</option>
                  </select>
                </label>
                <input
                  data-role="custom-length"
                  type="number"
                  min="100"
                  step="100"
                  value="500"
                  aria-label="Custom simplification word count"
                  hidden
                  disabled
                />
                <button data-role="simplify-text" class="secondary-action" type="button">AI simplify</button>
              </div>
            </div>
            <textarea data-role="text-input" rows="8" placeholder="Paste text here, upload a file, then press Start."></textarea>
          </div>

          <div class="file-row">
            <label class="file-picker">
              Upload file
              <input
                data-role="file-input"
                type="file"
                accept=".txt,.md,.pdf,text/plain,text/markdown,application/pdf"
              />
            </label>
            <span data-role="file-name" class="file-name">No file selected</span>
          </div>

          <div class="toggle-row">
            <label class="toggle-control">
              <input data-role="ai-toggle" type="checkbox" />
              <span>AI extraction</span>
            </label>
          </div>

          <p data-role="status-message" class="status-message" role="status"></p>
        </section>
      </article>
    </template>
  </body>
</html>
